evolution:
  pop_size: 1500            # was 900; more diversity, more GPU work per predict batch
  n_generations: 500000     # early stop governs; ~24h run
  crossover_prob: 0.7
  mutation_prob: 0.2
  cluster_app_prob: 0.20
  seed: 42
  inject_seed: true
surrogate:
  enabled: true
  initial_exact_samples: 5000   # bootstrap; gets washed out by mini-evals quickly
  exact_eval_every: 300         # full-pop exact eval still runs periodically
  retrain_every: 300
  train_epochs: 100
  retrain_epochs: 40
  batch_size: 8192               # large batches saturate GTX 1070 compute
  max_retrain_samples: 9000      # keep only recent 9000 samples → local surrogate, higher R²
  hidden_dim: 256
  embedding_dim: 32
training:
  require_cuda: true
  require_gpu_primary: true
  allow_cpu_exact_validation: true
exact_eval:
  batch_size: 100                # was 50; larger Numba batch per exact-eval call
  use_numba: true
  validate_parity: false
  parity_samples: 16
  parity_tolerance: 1e-4
fitness:
  weights:
    effort: 8.0
    adjacency: 1.5
    finger_balance: 0.8
    same_finger: 2.0
    violations: 120.0
    workflow_coherence: 30.0
    trackball_proximity: 5.0
    app_coherence: 5.0
    familiarity: 12.0
    layer_similarity: 8.0
    everything_layer: 8.0
  shortcut_importance_overrides:
    Win+S: 12.0
    LeftArrow: 4.0
    RightArrow: 4.0
    UpArrow: 4.0
    DownArrow: 4.0
  missing_important_threshold: 6.0
  toggle_effort_multiplier: 4.0
  violation_sub_weights:
    duplicate: 10.0
    l0_displacement: 50.0
    missing_important: 500.0
    cross_layer_duplicate: 25.0
    group_split: 200.0
    thumb_occupancy: 30000.0
    arrow_order: 10000.0
    hand_bias: 25000.0
    mouse_layer_access: 25000.0
    arrow_scattered: 50000.0
    mouse_scattered: 500.0
    layer7_access: 50000.0
    duplicate_value_gap: 500.0
    access_layout: 3000.0
    raw_keyboard_completion_norwegian: 80000.0
    dynamic_mouse_layer: 200000.0
    empty_position: 50.0
    layer_reachability: 50000.0
    layer_depth_penalty: 2000.0
    natural_mouse_layer_exists: 200000
    toggle_back_to_l0: 50000.0
  hard_constraints:
    - missing_important
    - layer7_access
    - natural_mouse_layer_exists
    - layer_reachability
    - toggle_back_to_l0
output:
  checkpoint_interval: 500
  verbose: true
